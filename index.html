<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Digital Waste Intelligence Platform</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  </head>

  <body>
    <!-- ================= LOGIN PAGE ================= -->
    <div id="authSection">
      <header class="navbar">
        <h1>Digital Waste Intelligence Platform</h1>
      </header>

      <div class="container">
        <div class="card">
          <h3>Login</h3>
          <input id="loginUsername" placeholder="Username" />
          <input type="password" id="loginPassword" placeholder="Password" />
          <button onclick="loginUser()">Login</button>
          <p id="loginMessage"></p>
        </div>

        <div class="card">
          <h3>Register</h3>
          <input id="username" placeholder="Username" />
          <input type="password" id="password" placeholder="Password" />
          <button onclick="registerUser()">Register</button>
          <p id="message"></p>
        </div>
      </div>
    </div>

    <div id="adminPanel" style="display: none">
      <h3>Admin Dashboard</h3>
      <p>Total Users: <span id="count"></span></p>
      <p>Total Complaints: <span id="totalComplaints"></span></p>
    </div>

    <!-- ================= MAIN DASHBOARD ================= -->
    <div id="mainSection" style="display: none">
      <header class="navbar">
        <div class="logo">
          <img
            src="https://clipground.com/images/swachh-bharat-clipart-logo-3.jpg"
            class="logo-img"
          />
          <span>♻️ Waste Intelligence</span>
        </div>

        <div class="nav-right">
          <span id="welcomeMessage"></span>
          <button id="logoutBtn" onclick="logoutUser()" style="display: none">
            Logout
          </button>
        </div>
      </header>

      <div class="container">
        <!-- MAP -->
        <div class="card" style="max-width: 1000px; width: 100%">
          <h3>Live Vehicle Tracking</h3>
          <div id="map" style="height: 400px"></div>
          <button id="heatmapBtn" onclick="generateHeatmap()">Heatmap</button>
        </div>

        <!-- COMPLAINT -->
        <div class="card">
          <h3>Report Complaint</h3>

          <input type="text" id="complaintText" placeholder="Enter Complaint" />

          <select id="category">
            <option value="Garbage">Garbage</option>
            <option value="Missed Pickup">Missed Pickup</option>
            <option value="Other">Other</option>
          </select>

          <button onclick="addComplaint()">Submit</button>

          <h4>Complaints</h4>
          <ul id="complaintList"></ul>
        </div>

        <!-- PICKUP -->
        <div class="card">
          <h3>Pickup Reminder</h3>
          <div id="pickupControls" style="display: none">
            <input type="datetime-local" id="pickupDate" />

            <select id="pickupType">
              <option value="Garbage">Garbage</option>
            </select>

            <button id="pickupBtn" onclick="addPickup()">Add</button>
          </div>

          <ul id="pickupList"></ul>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <footer>
      <p>© 2026 Digital Waste Intelligence Platform</p>
      <p>Ahilyanagar Smart City | Hexacore 🚀</p>
    </footer>

    <script src="firebase.js"></script>
    <script src="script.js"></script>
  </body>
</html>
